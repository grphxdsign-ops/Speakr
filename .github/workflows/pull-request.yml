name: Pull request validation

on:
  pull_request:

permissions:
  contents: read

concurrency:
  group: pull-request-${{ github.event.pull_request.number }}
  cancel-in-progress: true

env:
  HF_HUB_OFFLINE: "1"
  TRANSFORMERS_OFFLINE: "1"
  QT_QPA_PLATFORM: offscreen
  QT_QUICK_BACKEND: software
  QSG_RHI_BACKEND: software
  SPEAKR_QT_SOFTWARE: "1"
  PYTHONUNBUFFERED: "1"
  PIP_DISABLE_PIP_VERSION_CHECK: "1"

jobs:
  validate:
    name: Validate (${{ matrix.platform }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: Windows
            runner: windows-latest
          - platform: macOS
            runner: macos-latest
    runs-on: ${{ matrix.runner }}

    steps:
      - name: Check out pull request
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate committed diff
        shell: bash
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: git diff --check "$BASE_SHA...$HEAD_SHA"

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements*.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Compile Python sources
        run: python -m compileall -q speakr tests scripts

      - name: Enforce Essentials-only Qt environment
        run: python scripts/check_qt_build_environment.py

      - name: Run unit and interface contract tests
        run: python -m unittest discover -s tests -v

      - name: Ensure validation left tracked files clean
        shell: bash
        run: |
          if [ -n "$(git status --porcelain --untracked-files=no)" ]; then
            git status --short --untracked-files=no
            git diff
            exit 1
          fi
