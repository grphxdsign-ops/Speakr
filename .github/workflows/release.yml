# Builds the click-and-done installers the download site points at:
#   Speakr.dmg        — fully self-contained Speakr.app (Python bundled by
#                       PyInstaller, nothing to install on the machine) in a
#                       drag-to-Applications disk image. Apple Silicon.
#   Speakr-Setup.exe  — Inno Setup installer wrapping the PyInstaller onedir
#                       build: per-user (no admin prompt), Start Menu +
#                       optional desktop shortcut, launches Speakr when done.
#
# Trigger: push a tag like v0.1.0 (or run manually from the Actions tab with
# a tag name). Assets land on the GitHub release for that tag, and the site's
# download buttons pick them up automatically via the releases/latest API.
name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. v0.1.0)"
        required: true

permissions:
  contents: write

jobs:
  mac-dmg:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pyinstaller

      - name: Build icon (.icns)
        run: |
          mkdir speakr.iconset
          for s in 16 32 128 256 512; do
            sips -z $s $s assets/icon.png --out speakr.iconset/icon_${s}x${s}.png >/dev/null
            sips -z $((s*2)) $((s*2)) assets/icon.png --out speakr.iconset/icon_${s}x${s}@2x.png >/dev/null
          done
          iconutil -c icns speakr.iconset -o speakr.icns

      - name: Build Speakr.app (self-contained, Python bundled)
        # --paths .: frozen_entry.py lives in scripts/, and PyInstaller's
        # import analysis searches the ENTRY SCRIPT'S OWN directory, not the
        # working directory it was invoked from — without this, it can't see
        # the speakr/ package one level up at the repo root, "successfully"
        # builds anyway, and only fails at actual runtime with
        # ModuleNotFoundError: No module named 'speakr' (reproduced locally
        # before adding this flag).
        # --collect-all on the ML stack: ctranslate2 ships native libs and
        # faster_whisper ships the bundled Silero VAD onnx asset, neither of
        # which static import analysis finds. pystray picks its macOS backend
        # with a dynamic import, hence the explicit hidden-import.
        run: >
          pyinstaller --noconfirm --windowed
          --name Speakr --icon speakr.icns
          --osx-bundle-identifier com.speakr.dictation
          --paths .
          --collect-all ctranslate2
          --collect-all faster_whisper
          --collect-all onnxruntime
          --hidden-import pystray._darwin
          scripts/frozen_entry.py

      - name: Smoke-test the build
        # A PyInstaller build can report success while being completely
        # broken at runtime (exactly what shipped in v0.1.0 — missing
        # --paths . above meant the speakr package silently wasn't bundled
        # at all). Actually launch it and confirm it's still alive a few
        # seconds later instead of trusting the build exit code alone.
        run: |
          dist/Speakr.app/Contents/MacOS/Speakr > smoke.log 2>&1 &
          pid=$!
          sleep 4
          if ! kill -0 "$pid" 2>/dev/null; then
            echo "::error::Speakr exited within 4s of launch — the build is broken. Output:"
            cat smoke.log
            exit 1
          fi
          kill "$pid"
          echo "Smoke test passed — process was still alive after 4s."

      - name: Menu-bar metadata + permission strings
        # LSUIElement: menu-bar app, no Dock icon (matches how Speakr runs).
        # The usage strings are what macOS shows on the permission prompts.
        run: |
          PLIST=dist/Speakr.app/Contents/Info.plist
          plutil -replace LSUIElement -bool true "$PLIST" 2>/dev/null || plutil -insert LSUIElement -bool true "$PLIST"
          plutil -insert NSMicrophoneUsageDescription -string "Speakr transcribes your dictation locally on this Mac. Audio never leaves the machine." "$PLIST" 2>/dev/null || true

      - name: Wrap into Speakr.dmg
        run: |
          mkdir dmgroot
          cp -R dist/Speakr.app dmgroot/
          ln -s /Applications dmgroot/Applications
          hdiutil create -volname Speakr -srcfolder dmgroot -ov -format UDZO Speakr.dmg

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          files: Speakr.dmg

  windows-installer:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pyinstaller pillow

      - name: Convert icon to .ico
        run: python -c "from PIL import Image; Image.open('assets/icon.png').save('icon.ico', sizes=[(16,16),(32,32),(48,48),(256,256)])"

      - name: Build Speakr (onedir)
        # onedir, not onefile: onefile re-extracts hundreds of MB into a temp
        # dir on EVERY launch. The Inno installer below gives the one-file
        # download UX without that per-launch cost.
        # --paths .: see the matching comment in the mac-dmg job — same
        # entry-script-in-a-subdirectory gap, reproduced locally on both
        # platforms' build shape before adding this flag.
        run: >
          pyinstaller --noconfirm --windowed
          --name Speakr --icon icon.ico
          --paths .
          --collect-all ctranslate2
          --collect-all faster_whisper
          --collect-all onnxruntime
          --hidden-import pystray._win32
          --hidden-import comtypes.stream
          scripts/frozen_entry.py

      - name: Smoke-test the build
        # Same regression guard as the mac-dmg job: a PyInstaller build can
        # report success while being completely broken at runtime (exactly
        # what v0.1.0 shipped — missing --paths . above meant the speakr
        # package silently wasn't bundled at all). Actually launch it and
        # confirm it's still alive a few seconds later.
        shell: pwsh
        run: |
          $p = Start-Process -FilePath "dist\Speakr\Speakr.exe" `
               -RedirectStandardOutput smoke_out.log -RedirectStandardError smoke_err.log -PassThru
          Start-Sleep -Seconds 4
          if ($p.HasExited) {
            Write-Host "::error::Speakr.exe exited within 4s of launch — the build is broken. Output:"
            Get-Content smoke_out.log, smoke_err.log -ErrorAction SilentlyContinue
            exit 1
          }
          Stop-Process -Id $p.Id -Force
          Write-Host "Smoke test passed — process was still alive after 4s."

      - name: Build Speakr-Setup.exe (Inno Setup)
        shell: pwsh
        run: |
          $tag = "${{ github.event.inputs.tag || github.ref_name }}"
          $ver = $tag.TrimStart("v")
          $iscc = "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe"
          if (!(Test-Path $iscc)) {
            choco install innosetup -y --no-progress
            $iscc = "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe"
          }
          & $iscc /DAppVersion=$ver scripts\installer.iss
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          files: Speakr-Setup.exe
