# Builds the click-and-done installers the download site points at:
#   Speakr.dmg        — fully self-contained Speakr.app (Python bundled by
#                       PyInstaller, nothing to install on the machine) in a
#                       drag-to-Applications disk image. Apple Silicon.
#   Speakr-Setup.exe  — Inno Setup installer wrapping the PyInstaller onedir
#                       build: per-user (no admin prompt), Start Menu +
#                       optional desktop shortcut, launches Speakr when done.
#
# Trigger: push a tag like v0.1.0 (or run manually from the Actions tab with
# a tag name). Assets land on the GitHub release for that tag, and the site's
# download buttons pick them up automatically via the releases/latest API.
#
# Mac signing: with no secrets configured the app ships ad-hoc signed —
# launchable everywhere, but Gatekeeper shows the one-time "unidentified
# developer" approval on first open (that prompt is Apple policy for
# anything not notarized; no build step can remove it). To make the DMG
# truly zero-prompt, add these repo secrets and the workflow upgrades
# itself to Developer ID signing + notarization automatically:
#   MACOS_CERTIFICATE_P12        base64 of a Developer ID Application .p12
#   MACOS_CERTIFICATE_PASSWORD   password for that .p12
#   APPLE_ID                     Apple ID email of the developer account
#   APPLE_TEAM_ID                10-char team ID
#   APPLE_APP_SPECIFIC_PASSWORD  app-specific password for notarytool
name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. v0.1.0)"
        required: true

permissions:
  contents: write

jobs:
  mac-dmg:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pyinstaller

      - name: Enforce Essentials-only Qt build environment
        run: python scripts/check_qt_build_environment.py

      - name: Run unit and interface contract tests
        env:
          QT_QPA_PLATFORM: offscreen
        run: python -m unittest discover -s tests -v

      - name: Build icon (.icns)
        run: |
          mkdir speakr.iconset
          for s in 16 32 128 256 512; do
            sips -z $s $s assets/icon.png --out speakr.iconset/icon_${s}x${s}.png >/dev/null
            sips -z $((s*2)) $((s*2)) assets/icon.png --out speakr.iconset/icon_${s}x${s}@2x.png >/dev/null
          done
          iconutil -c icns speakr.iconset -o speakr.icns

      - name: Build Speakr.app (self-contained, Python bundled)
        # --paths .: frozen_entry.py lives in scripts/, and PyInstaller's
        # import analysis searches the ENTRY SCRIPT'S OWN directory, not the
        # working directory it was invoked from — without this, it can't see
        # the speakr/ package one level up at the repo root, "successfully"
        # builds anyway, and only fails at actual runtime with
        # ModuleNotFoundError: No module named 'speakr' (reproduced locally
        # before adding this flag).
        # --collect-all on the ML stack: ctranslate2 ships native libs and
        # faster_whisper ships the bundled Silero VAD onnx asset, neither of
        # which static import analysis finds. pystray picks its macOS backend
        # with a dynamic import, hence the explicit hidden-import.
        run: >
          pyinstaller --noconfirm --windowed
          --name Speakr --icon speakr.icns
          --osx-bundle-identifier com.speakr.dictation
          --paths .
          --collect-all ctranslate2
          --collect-all faster_whisper
          --collect-all onnxruntime
          --hidden-import pystray._darwin
          --hidden-import PySide6.QtQuick
          --hidden-import PySide6.QtQuickControls2
          --add-data "speakr/ui/qml:speakr/ui/qml"
          --add-data "assets/icon.png:assets"
          --exclude-module PySide6.QtWebEngine
          --exclude-module PySide6.QtWebEngineCore
          --exclude-module PySide6.QtWebEngineQuick
          --exclude-module PySide6.QtWebEngineWidgets
          --exclude-module PySide6.QtWebView
          --exclude-module PySide6.QtWebChannel
          scripts/frozen_entry.py

      - name: Add Qt open-source notice
        run: |
          cat > dist/Speakr.app/Contents/Resources/THIRD_PARTY_NOTICES.txt <<'NOTICE'
          Speakr includes Qt for Python / PySide6-Essentials 6.11.1.
          Qt for Python is copyright The Qt Company Ltd. and contributors.
          The installed open-source package is offered under LGPL-3.0-only,
          GPL-2.0-only, or GPL-3.0-only, as described by its package metadata.
          Speakr does not modify Qt source files.
          NOTICE

      - name: Audit native UI artifact
        # Run before plist mutation, signing, and DMG wrapping. The scanner
        # requires Main.qml, Hud.qml, and the local icon; rejects embedded
        # browser/Addons filenames; and permits only loopback URLs in UI data.
        run: python scripts/scan_artifact_privacy.py dist/Speakr.app

      - name: Menu-bar metadata + permission strings
        # LSUIElement: menu-bar app, no Dock icon (matches how Speakr runs).
        # The usage strings are what macOS shows on the permission prompts.
        # MUST run before the signing step below: editing Info.plist changes
        # a file the code signature seals, so any signature present at edit
        # time is invalidated — exactly what shipped in v0.1.1, where this
        # edit ran AFTER PyInstaller's build-time ad-hoc signing and Apple
        # Silicon Macs refused to launch the app at all ("Speakr is damaged
        # and can't be opened").
        run: |
          PLIST=dist/Speakr.app/Contents/Info.plist
          plutil -replace LSUIElement -bool true "$PLIST" 2>/dev/null || plutil -insert LSUIElement -bool true "$PLIST"
          plutil -insert NSMicrophoneUsageDescription -string "Speakr transcribes your dictation locally on this Mac. Audio never leaves the machine." "$PLIST" 2>/dev/null || true

      - name: Sign Speakr.app
        # Re-sign the whole bundle now that Info.plist is final. Apple
        # Silicon kills any app whose signature is invalid, so this step is
        # what makes the downloaded app launchable at all. With a Developer
        # ID cert in the repo secrets this signs for real (hardened runtime,
        # ready to notarize); otherwise it falls back to a valid ad-hoc
        # signature, which launches fine after Gatekeeper's one-time
        # unidentified-developer approval.
        env:
          MACOS_CERTIFICATE_P12: ${{ secrets.MACOS_CERTIFICATE_P12 }}
          MACOS_CERTIFICATE_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
        run: |
          xattr -cr dist/Speakr.app
          if [ -n "$MACOS_CERTIFICATE_P12" ]; then
            echo "$MACOS_CERTIFICATE_P12" | base64 -d > cert.p12
            security create-keychain -p ci build.keychain
            security default-keychain -s build.keychain
            security unlock-keychain -p ci build.keychain
            security import cert.p12 -k build.keychain -P "$MACOS_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
            security set-key-partition-list -S apple-tool:,apple: -s -k ci build.keychain > /dev/null
            rm cert.p12
            IDENTITY=$(security find-identity -v -p codesigning build.keychain | awk -F'"' 'NR==1{print $2}')
            echo "Signing with Developer ID: $IDENTITY"
            codesign --force --deep --options runtime --timestamp \
              --entitlements scripts/entitlements.plist \
              --sign "$IDENTITY" dist/Speakr.app
            echo "SIGN_IDENTITY=$IDENTITY" >> "$GITHUB_ENV"
          else
            echo "No signing certificate in secrets — ad-hoc signing (see the comment at the top of this file to make the DMG zero-prompt)."
            codesign --force --deep --sign - dist/Speakr.app
          fi
          codesign --verify --deep --strict --verbose=2 dist/Speakr.app

      - name: Smoke-test the build
        # A PyInstaller build can report success while being completely
        # broken at runtime (exactly what shipped in v0.1.0 — missing
        # --paths . above meant the speakr package silently wasn't bundled
        # at all). Actually launch it and confirm it's still alive a few
        # seconds later instead of trusting the build exit code alone.
        # Runs AFTER the plist edit + re-sign so it exercises the exact
        # bundle that ships — v0.1.1's smoke test passed on a bundle that a
        # later step then broke. Hugging Face is forced offline here: the UI
        # must remain usable in its truthful model-recovery state, and a
        # packaging smoke test must not download model weights.
        run: |
          SMOKE_HOME="$RUNNER_TEMP/speakr-native-smoke"
          rm -rf "$SMOKE_HOME"
          mkdir -p "$SMOKE_HOME"
          HF_HUB_OFFLINE=1 SPEAKR_HOME="$SMOKE_HOME" dist/Speakr.app/Contents/MacOS/Speakr > smoke.log 2>&1 &
          pid=$!
          sleep 6
          if ! kill -0 "$pid" 2>/dev/null; then
            echo "::error::Speakr exited within 6s of launch — the build is broken. Output:"
            cat smoke.log
            [ -f "$SMOKE_HOME/speakr.log" ] && cat "$SMOKE_HOME/speakr.log"
            exit 1
          fi
          if { cat smoke.log; [ -f "$SMOKE_HOME/speakr.log" ] && cat "$SMOKE_HOME/speakr.log"; } | grep -Eiq "Native UI (unavailable|failed)|using recovery interface" || [ -f "$SMOKE_HOME/panel.url" ]; then
            echo "::error::Speakr stayed alive only by selecting the browser recovery interface; the native QML release is broken."
            cat smoke.log
            [ -f "$SMOKE_HOME/speakr.log" ] && cat "$SMOKE_HOME/speakr.log"
            kill "$pid" 2>/dev/null || true
            exit 1
          fi
          kill "$pid"
          echo "Smoke test passed — process stayed alive with the native QML frontend."

      - name: Wrap into Speakr.dmg
        run: |
          mkdir dmgroot
          cp -R dist/Speakr.app dmgroot/
          ln -s /Applications dmgroot/Applications
          hdiutil create -volname Speakr -srcfolder dmgroot -ov -format UDZO Speakr.dmg

      - name: Notarize and staple the DMG
        # Only when a Developer ID cert was used above. Notarizing the DMG
        # covers the app inside it; stapling means Gatekeeper can verify
        # offline — first launch is completely prompt-free (bar the
        # standard mic/accessibility permission asks).
        if: env.SIGN_IDENTITY != ''
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
        run: |
          codesign --force --timestamp --sign "$SIGN_IDENTITY" Speakr.dmg
          xcrun notarytool submit Speakr.dmg --wait \
            --apple-id "$APPLE_ID" \
            --team-id "$APPLE_TEAM_ID" \
            --password "$APPLE_APP_SPECIFIC_PASSWORD"
          xcrun stapler staple Speakr.dmg

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          files: Speakr.dmg

  windows-installer:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pyinstaller pillow

      - name: Enforce Essentials-only Qt build environment
        run: python scripts/check_qt_build_environment.py

      - name: Run unit and interface contract tests
        env:
          QT_QPA_PLATFORM: offscreen
        run: python -m unittest discover -s tests -v

      - name: Convert icon to .ico
        run: python -c "from PIL import Image; Image.open('assets/icon.png').save('icon.ico', sizes=[(16,16),(32,32),(48,48),(256,256)])"

      - name: Build Speakr (onedir)
        # onedir, not onefile: onefile re-extracts hundreds of MB into a temp
        # dir on EVERY launch. The Inno installer below gives the one-file
        # download UX without that per-launch cost.
        # --paths .: see the matching comment in the mac-dmg job — same
        # entry-script-in-a-subdirectory gap, reproduced locally on both
        # platforms' build shape before adding this flag.
        run: >
          pyinstaller --noconfirm --windowed
          --name Speakr --icon icon.ico
          --paths .
          --collect-all ctranslate2
          --collect-all faster_whisper
          --collect-all onnxruntime
          --hidden-import pystray._win32
          --hidden-import comtypes.stream
          --hidden-import PySide6.QtQuick
          --hidden-import PySide6.QtQuickControls2
          --add-data "speakr/ui/qml:speakr/ui/qml"
          --add-data "assets/icon.png:assets"
          --exclude-module PySide6.QtWebEngine
          --exclude-module PySide6.QtWebEngineCore
          --exclude-module PySide6.QtWebEngineQuick
          --exclude-module PySide6.QtWebEngineWidgets
          --exclude-module PySide6.QtWebView
          --exclude-module PySide6.QtWebChannel
          scripts/frozen_entry.py

      - name: Add Qt open-source notice
        shell: pwsh
        run: |
          @'
          Speakr includes Qt for Python / PySide6-Essentials 6.11.1.
          Qt for Python is copyright The Qt Company Ltd. and contributors.
          The installed open-source package is offered under LGPL-3.0-only,
          GPL-2.0-only, or GPL-3.0-only, as described by its package metadata.
          Speakr does not modify Qt source files.
          '@ | Set-Content -Encoding utf8 dist\Speakr\THIRD_PARTY_NOTICES.txt

      - name: Audit native UI artifact
        run: python scripts\scan_artifact_privacy.py dist\Speakr

      - name: Smoke-test the build
        # Same regression guard as the mac-dmg job: a PyInstaller build can
        # report success while being completely broken at runtime (exactly
        # what v0.1.0 shipped — missing --paths . above meant the speakr
        # package silently wasn't bundled at all). Actually launch it and
        # confirm it's still alive a few seconds later. Model downloads are
        # disabled so this verifies the native UI's offline recovery state.
        shell: pwsh
        run: |
          $smokeHome = Join-Path $env:RUNNER_TEMP "speakr-native-smoke"
          Remove-Item -Recurse -Force $smokeHome -ErrorAction SilentlyContinue
          New-Item -ItemType Directory -Path $smokeHome | Out-Null
          $env:SPEAKR_HOME = $smokeHome
          $env:HF_HUB_OFFLINE = "1"
          $p = Start-Process -FilePath "dist\Speakr\Speakr.exe" `
               -RedirectStandardOutput smoke_out.log -RedirectStandardError smoke_err.log -PassThru
          Start-Sleep -Seconds 6
          if ($p.HasExited) {
            Write-Host "::error::Speakr.exe exited within 6s of launch — the build is broken. Output:"
            Get-Content smoke_out.log, smoke_err.log -ErrorAction SilentlyContinue
            Get-Content (Join-Path $smokeHome "speakr.log") -ErrorAction SilentlyContinue
            exit 1
          }
          $logText = @(
            Get-Content smoke_out.log, smoke_err.log -ErrorAction SilentlyContinue
            Get-Content (Join-Path $smokeHome "speakr.log") -ErrorAction SilentlyContinue
          ) -join "`n"
          if ($logText -match "Native UI (unavailable|failed)|using recovery interface" -or
              (Test-Path (Join-Path $smokeHome "panel.url"))) {
            Write-Host "::error::Speakr stayed alive only by selecting the browser recovery interface; the native QML release is broken."
            Write-Host $logText
            Stop-Process -Id $p.Id -Force -ErrorAction SilentlyContinue
            exit 1
          }
          Stop-Process -Id $p.Id -Force
          Write-Host "Smoke test passed — process stayed alive with the native QML frontend."

      - name: Build Speakr-Setup.exe (Inno Setup)
        shell: pwsh
        run: |
          $tag = "${{ github.event.inputs.tag || github.ref_name }}"
          $ver = $tag.TrimStart("v")
          $iscc = "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe"
          if (!(Test-Path $iscc)) {
            choco install innosetup -y --no-progress
            $iscc = "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe"
          }
          & $iscc /DAppVersion=$ver scripts\installer.iss
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          files: Speakr-Setup.exe
