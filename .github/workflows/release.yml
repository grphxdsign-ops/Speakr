name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Optional exact existing tag to prove; manual runs never publish"
        required: false
        type: string

# Build jobs are read-only. Only the final, tag-verified publisher receives
# permission to create or mutate a GitHub release.
permissions:
  contents: read

concurrency:
  group: release-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'workflow_dispatch' }}

env:
  HF_HUB_OFFLINE: "1"
  TRANSFORMERS_OFFLINE: "1"
  PIP_DISABLE_PIP_VERSION_CHECK: "1"

jobs:
  release_context:
    name: Resolve immutable release context
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    outputs:
      sha: ${{ steps.context.outputs.sha }}
      tag: ${{ steps.context.outputs.tag }}
      version: ${{ steps.context.outputs.version }}
      publish: ${{ steps.context.outputs.publish }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Verify tag identity
        id: context
        env:
          REQUESTED_TAG: ${{ inputs.tag || '' }}
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
        shell: bash
        run: |
          set -euo pipefail
          sha="$(git rev-parse HEAD)"
          candidate=""
          publish="false"
          tag_verified="false"

          if [ "$GITHUB_EVENT_NAME" = "push" ]; then
            candidate="$GITHUB_REF_NAME"
          elif [ -n "$REQUESTED_TAG" ]; then
            candidate="$REQUESTED_TAG"
          fi

          if [ -n "$candidate" ]; then
            if [[ ! "$candidate" =~ ^v[0-9]+\.[0-9]+\.[0-9]+([.-][0-9A-Za-z.-]+)?$ ]]; then
              echo "::warning::'$candidate' is not a versioned vMAJOR.MINOR.PATCH tag; this run is proof-only."
            elif ! git show-ref --verify --quiet "refs/tags/$candidate"; then
              echo "::warning::'$candidate' is not an existing repository tag; this run is proof-only."
            elif [ "$(git rev-list -n 1 "$candidate")" != "$sha" ]; then
              echo "::warning::'$candidate' does not identify checked-out commit $sha; this run is proof-only."
            else
              tag_verified="true"
            fi
          fi

          if [ "$GITHUB_EVENT_NAME" = "push" ]; then
            if [ "$tag_verified" != "true" ]; then
              echo "::error::A tag-triggered run must resolve to that exact existing tag and commit."
              exit 1
            fi
            git fetch --no-tags origin \
              "$DEFAULT_BRANCH:refs/remotes/origin/$DEFAULT_BRANCH"
            if ! git merge-base --is-ancestor "$sha" "origin/$DEFAULT_BRANCH"; then
              echo "::error::A release tag must identify a commit already merged into $DEFAULT_BRANCH."
              exit 1
            fi
            publish="true"
          elif [ "$tag_verified" = "true" ]; then
            echo "Manual proof is pinned to existing tag $candidate; publication remains disabled."
          fi

          if [ "$tag_verified" = "true" ]; then
            version="${candidate#v}"
            tag="$candidate"
          else
            version="0.0.0-proof.$GITHUB_RUN_NUMBER"
            tag=""
          fi

          {
            echo "sha=$sha"
            echo "tag=$tag"
            echo "version=$version"
            echo "publish=$publish"
          } >> "$GITHUB_OUTPUT"
          echo "Build SHA: $sha"
          echo "Publish: $publish"
          [ -z "$tag" ] || echo "Verified tag: $tag"

  mac_dmg:
    name: macOS copied-artifact proof
    needs: release_context
    runs-on: macos-15
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ needs.release_context.outputs.sha }}
          fetch-depth: 0

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.11"

      - name: Install pinned release environment
        run: |
          python -m pip install -r requirements-release.txt
          python -m pip check
          python scripts/check_qt_build_environment.py

      - name: Run offline unit and interface contracts
        env:
          QT_QPA_PLATFORM: offscreen
        run: |
          python -m compileall -q speakr tests scripts
          python -m unittest discover -s tests -v

      - name: Preseed the permitted local model for exact-artifact core proof
        env:
          HF_HOME: ${{ runner.temp }}/speakr-hf-proof
          HF_HUB_OFFLINE: "0"
          TRANSFORMERS_OFFLINE: "0"
          HF_HUB_DISABLE_TELEMETRY: "1"
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          import numpy as np
          from faster_whisper import WhisperModel

          model = WhisperModel("tiny", device="cpu", compute_type="int8")
          segments, _ = model.transcribe(np.zeros(8000, dtype=np.float32), beam_size=1)
          list(segments)
          print("Permitted one-time model seed is ready for offline artifact proof.")
          PY

      - name: Configure non-distributable macOS proof identity
        if: needs.release_context.outputs.publish != 'true'
        shell: bash
        run: |
          set -euo pipefail
          echo "MAC_DISTRIBUTION_SIGNED=false" >> "$GITHUB_ENV"
          echo "SPEAKR_SIGN_IDENTITY=-" >> "$GITHUB_ENV"
          echo "Manual proof is forced to ad-hoc signing and cannot access distribution credentials."

      - name: Prepare Developer ID identity
        if: needs.release_context.outputs.publish == 'true'
        env:
          MACOS_CERTIFICATE_P12: ${{ secrets.MACOS_CERTIFICATE_P12 }}
          MACOS_CERTIFICATE_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
        shell: bash
        run: |
          set -euo pipefail
          missing=0
          for name in MACOS_CERTIFICATE_P12 MACOS_CERTIFICATE_PASSWORD APPLE_ID APPLE_TEAM_ID APPLE_APP_SPECIFIC_PASSWORD; do
            if [ -z "${!name}" ]; then
              missing=$((missing + 1))
            fi
          done

          if [ "$missing" -ne 0 ]; then
            echo "::error::Tag publication is blocked until Developer ID and notarization credentials are configured."
            exit 1
          fi

          python - <<'PY'
          import base64
          import os
          from pathlib import Path
          Path("cert.p12").write_bytes(base64.b64decode(os.environ["MACOS_CERTIFICATE_P12"]))
          PY
          security create-keychain -p ci build.keychain
          security set-keychain-settings -lut 21600 build.keychain
          security unlock-keychain -p ci build.keychain
          security import cert.p12 -k build.keychain \
            -P "$MACOS_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple: -s -k ci build.keychain >/dev/null
          security list-keychains -d user -s build.keychain login.keychain-db
          rm -f cert.p12

          identity="$(security find-identity -v -p codesigning build.keychain \
            | awk -F'"' '/Developer ID Application/{print $2; exit}')"
          if [ -z "$identity" ]; then
            echo "::error::Certificate does not contain a Developer ID Application identity."
            exit 1
          fi
          echo "MAC_DISTRIBUTION_SIGNED=true" >> "$GITHUB_ENV"
          echo "SPEAKR_SIGN_IDENTITY=$identity" >> "$GITHUB_ENV"
          echo "Developer ID identity prepared."

      - name: Build, scan, and explicitly sign Speakr.app
        env:
          PYTHON: python
        run: bash package_mac.sh

      - name: Notarize and staple distribution app
        if: needs.release_context.outputs.publish == 'true' && env.MAC_DISTRIBUTION_SIGNED == 'true'
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
        shell: bash
        run: |
          set -euo pipefail
          ditto -c -k --keepParent dist/Speakr.app Speakr-notarization.zip
          xcrun notarytool submit Speakr-notarization.zip --wait \
            --apple-id "$APPLE_ID" \
            --team-id "$APPLE_TEAM_ID" \
            --password "$APPLE_APP_SPECIFIC_PASSWORD"
          xcrun stapler staple dist/Speakr.app
          xcrun stapler validate dist/Speakr.app
          codesign --verify --strict --verbose=2 dist/Speakr.app
          rm -f Speakr-notarization.zip

      - name: Create final DMG
        shell: bash
        run: |
          set -euo pipefail
          dmgroot="$RUNNER_TEMP/speakr-dmgroot"
          case "$dmgroot" in "$RUNNER_TEMP"/*) rm -rf -- "$dmgroot" ;; *) exit 1 ;; esac
          mkdir -p "$dmgroot"
          ditto dist/Speakr.app "$dmgroot/Speakr.app"
          ln -s /Applications "$dmgroot/Applications"
          sync
          dmg_created=false
          for attempt in 1 2 3; do
            rm -f -- Speakr.dmg
            if hdiutil create -volname Speakr -srcfolder "$dmgroot" \
                -ov -format UDZO Speakr.dmg; then
              dmg_created=true
              break
            fi
            echo "::warning::DMG creation attempt $attempt was busy; retrying."
            sync
            sleep $((attempt * 3))
          done
          if [ "$dmg_created" != "true" ]; then
            echo "::error::Could not create the final DMG after three bounded attempts."
            exit 1
          fi

      - name: Notarize and staple distribution DMG
        if: needs.release_context.outputs.publish == 'true' && env.MAC_DISTRIBUTION_SIGNED == 'true'
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
        shell: bash
        run: |
          set -euo pipefail
          codesign --force --timestamp --sign "$SPEAKR_SIGN_IDENTITY" Speakr.dmg
          xcrun notarytool submit Speakr.dmg --wait \
            --apple-id "$APPLE_ID" \
            --team-id "$APPLE_TEAM_ID" \
            --password "$APPLE_APP_SPECIFIC_PASSWORD"
          xcrun stapler staple Speakr.dmg
          xcrun stapler validate Speakr.dmg

      - name: Mount and prove the exact final DMG app offline
        env:
          HF_HOME: ${{ runner.temp }}/speakr-hf-proof
          RELEASE_SHA: ${{ needs.release_context.outputs.sha }}
          RELEASE_TAG: ${{ needs.release_context.outputs.tag }}
          RELEASE_VERSION: ${{ needs.release_context.outputs.version }}
        shell: bash
        run: |
          set -euo pipefail
          mountpoint="$RUNNER_TEMP/speakr-final-dmg"
          installroot="$RUNNER_TEMP/Applications"
          smoke_home="$RUNNER_TEMP/speakr-final-smoke-home"
          receipt="$RUNNER_TEMP/speakr-final-receipt.json"
          core_home="$RUNNER_TEMP/speakr-core-smoke-home"
          core_receipt="$RUNNER_TEMP/speakr-core-receipt.json"
          core_ui_receipt="$RUNNER_TEMP/speakr-core-ui-receipt.json"
          rm -rf -- "$mountpoint" "$installroot" "$smoke_home" "$core_home"
          rm -f -- "$receipt" "$core_receipt" "$core_ui_receipt"
          mkdir -p "$mountpoint" "$installroot" "$smoke_home" "$core_home"
          pid=""
          cleanup() {
            [ -z "$pid" ] || kill "$pid" 2>/dev/null || true
            hdiutil detach "$mountpoint" -quiet 2>/dev/null || true
          }
          trap cleanup EXIT

          hdiutil attach Speakr.dmg -readonly -nobrowse -mountpoint "$mountpoint"
          mounted_app="$mountpoint/Speakr.app"
          python scripts/scan_artifact_privacy.py "$mounted_app"
          codesign --verify --strict --verbose=2 "$mounted_app"
          ditto "$mounted_app" "$installroot/Speakr.app"
          installed_app="$installroot/Speakr.app"
          python scripts/scan_artifact_privacy.py "$installed_app"
          codesign --verify --strict --verbose=2 "$installed_app"
          lipo -archs "$installed_app/Contents/MacOS/Speakr" | tr ' ' '\n' | grep -qx arm64 || {
            echo "::error::Final DMG does not contain the required Apple Silicon executable."
            exit 1
          }
          if [ "$MAC_DISTRIBUTION_SIGNED" = "true" ]; then
            xcrun stapler validate Speakr.dmg
            xcrun stapler validate "$installed_app"
            spctl --assess --type execute --verbose=4 "$installed_app"
          fi

          SPEAKR_HOME="$smoke_home" \
          SPEAKR_RELEASE_PROOF_PATH="$receipt" \
          SPEAKR_RELEASE_PROOF_QUIT=1 \
          HF_HUB_OFFLINE=1 TRANSFORMERS_OFFLINE=1 \
            "$installed_app/Contents/MacOS/Speakr" >smoke.log 2>&1 &
          pid=$!
          for _ in $(seq 1 60); do
            [ -f "$receipt" ] && break
            kill -0 "$pid" 2>/dev/null || break
            sleep 0.5
          done
          if [ ! -f "$receipt" ]; then
            echo "::error::Copied app did not emit a native readiness receipt."
            cat smoke.log
            [ -f "$smoke_home/speakr.log" ] && cat "$smoke_home/speakr.log"
            exit 1
          fi
          for _ in $(seq 1 20); do
            kill -0 "$pid" 2>/dev/null || break
            sleep 0.5
          done
          if kill -0 "$pid" 2>/dev/null; then
            echo "::error::Copied app did not quit after writing its release receipt."
            exit 1
          fi
          set +e
          wait "$pid"
          status=$?
          set -e
          pid=""
          if [ "$status" -ne 0 ]; then
            echo "::error::Copied app exited with status $status."
            cat smoke.log
            exit 1
          fi
          python scripts/validate_release_receipt.py "$receipt"

          python - "$core_home/config.json" <<'PY'
          import json
          import sys
          from pathlib import Path

          config = {
              "model": "tiny",
              "device": "cpu",
              "compute_type": "int8",
              "keep_mic_stream_open": False,
              "log_transcripts": False,
              "screen_context": {"enabled": False},
              "edit_mode": {"enabled": False},
              "learning": {"enabled": False},
              "formatting": {
                  "enabled": True,
                  "use_ollama": False,
                  "autostart_ollama": False,
                  "include_recent_context": False,
              },
              "ui": {
                  "onboarding_complete": True,
                  "open_window_on_start": True,
                  "hud_visibility": "off",
              },
          }
          Path(sys.argv[1]).write_text(
              json.dumps(config, sort_keys=True), encoding="utf-8"
          )
          PY

          SPEAKR_HOME="$core_home" \
          SPEAKR_RELEASE_PROOF_PATH="$core_ui_receipt" \
          SPEAKR_RELEASE_CORE_PROOF_PATH="$core_receipt" \
          HF_HOME="$HF_HOME" \
            "$installed_app/Contents/MacOS/Speakr" >core-smoke.log 2>&1 &
          pid=$!
          for _ in $(seq 1 600); do
            [ -f "$core_receipt" ] && break
            kill -0 "$pid" 2>/dev/null || break
            sleep 0.5
          done
          if [ ! -f "$core_receipt" ] || [ ! -f "$core_ui_receipt" ]; then
            echo "::error::Copied app did not prove native UI plus offline core readiness."
            cat core-smoke.log
            [ -f "$core_home/speakr.log" ] && cat "$core_home/speakr.log"
            exit 1
          fi
          for _ in $(seq 1 20); do
            kill -0 "$pid" 2>/dev/null || break
            sleep 0.5
          done
          if kill -0 "$pid" 2>/dev/null; then
            echo "::error::Core proof process did not quit after readiness."
            exit 1
          fi
          set +e
          wait "$pid"
          status=$?
          set -e
          pid=""
          if [ "$status" -ne 0 ]; then
            echo "::error::Core proof process exited with status $status."
            cat core-smoke.log
            exit 1
          fi
          python scripts/validate_release_receipt.py "$core_ui_receipt"
          python scripts/validate_release_core_receipt.py "$core_receipt"

          if [ "$MAC_DISTRIBUTION_SIGNED" = "true" ]; then
            manifest_signed=true
            manifest_notarized=true
            manifest_kind=developer_id
            manifest_identity="$(codesign -dv --verbose=4 "$installed_app" 2>&1 \
              | awk '/^Authority=/ && !seen {sub(/^Authority=/, ""); print; seen=1}')"
            manifest_team="$(codesign -dv --verbose=4 "$installed_app" 2>&1 \
              | awk '/^TeamIdentifier=/ && !seen {sub(/^TeamIdentifier=/, ""); print; seen=1}')"
            [ -n "$manifest_identity" ] && [ -n "$manifest_team" ]
          else
            manifest_signed=false
            manifest_notarized=false
            manifest_kind=ad_hoc
            manifest_identity=ad_hoc
            manifest_team=none
          fi
          python scripts/release_manifest.py create \
            --output Speakr-macOS-manifest.json \
            --artifact Speakr.dmg \
            --dependency-lock requirements-release.txt \
            --native-receipt "$core_ui_receipt" \
            --core-receipt "$core_receipt" \
            --source-sha "$RELEASE_SHA" \
            --tag "$RELEASE_TAG" \
            --version "$RELEASE_VERSION" \
            --platform macos \
            --architecture arm64 \
            --signed "$manifest_signed" \
            --notarized "$manifest_notarized" \
            --signature-kind "$manifest_kind" \
            --signer-identity "$manifest_identity" \
            --signer-team "$manifest_team"
          hdiutil detach "$mountpoint"
          trap - EXIT

      - name: Upload macOS proof artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: ${{ needs.release_context.outputs.publish == 'true' && 'Speakr-macOS-release' || 'Speakr-macOS-proof-NON-DISTRIBUTABLE' }}
          path: |
            Speakr.dmg
            Speakr-macOS-manifest.json
          if-no-files-found: error
          retention-days: 14

      - name: Remove macOS signing material
        if: always() && needs.release_context.outputs.publish == 'true'
        shell: bash
        run: |
          rm -f cert.p12
          security delete-keychain build.keychain >/dev/null 2>&1 || true

  windows_installer:
    name: Windows installed-artifact proof
    needs: release_context
    runs-on: windows-2025
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ needs.release_context.outputs.sha }}
          fetch-depth: 0

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.11"

      - name: Install pinned release environment
        shell: pwsh
        run: |
          python -m pip install -r requirements-release.txt
          python -m pip check
          python scripts/check_qt_build_environment.py

      - name: Run offline unit and interface contracts
        env:
          QT_QPA_PLATFORM: offscreen
        shell: pwsh
        run: |
          python -m compileall -q speakr tests scripts
          python -m unittest discover -s tests -v

      - name: Preseed the permitted local model for exact-artifact core proof
        env:
          HF_HOME: ${{ runner.temp }}/speakr-hf-proof
          HF_HUB_OFFLINE: "0"
          TRANSFORMERS_OFFLINE: "0"
          HF_HUB_DISABLE_TELEMETRY: "1"
        shell: pwsh
        run: |
          @'
          import numpy as np
          from faster_whisper import WhisperModel

          model = WhisperModel("tiny", device="cpu", compute_type="int8")
          segments, _ = model.transcribe(np.zeros(8000, dtype=np.float32), beam_size=1)
          list(segments)
          print("Permitted one-time model seed is ready for offline artifact proof.")
          '@ | python -
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Configure non-distributable Windows proof identity
        if: needs.release_context.outputs.publish != 'true'
        shell: pwsh
        run: |
          "WINDOWS_DISTRIBUTION_SIGNED=false" | Out-File $env:GITHUB_ENV -Append -Encoding utf8
          Write-Host "Manual proof is forced to unsigned mode and cannot access distribution credentials."

      - name: Prepare Windows Authenticode identity
        if: needs.release_context.outputs.publish == 'true'
        env:
          WINDOWS_CERTIFICATE_PFX: ${{ secrets.WINDOWS_CERTIFICATE_PFX }}
          WINDOWS_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $hasPfx = ![string]::IsNullOrWhiteSpace($env:WINDOWS_CERTIFICATE_PFX)
          $hasPassword = ![string]::IsNullOrWhiteSpace($env:WINDOWS_CERTIFICATE_PASSWORD)
          if ($hasPfx -ne $hasPassword) {
            throw "Windows release credentials are partially configured; provide both PFX and password or neither."
          }
          if (!$hasPfx) {
            throw "Tag publication is blocked until the Windows Authenticode certificate is configured."
          }

          $pfxPath = Join-Path $env:RUNNER_TEMP "speakr-code-signing.pfx"
          [IO.File]::WriteAllBytes(
            $pfxPath,
            [Convert]::FromBase64String($env:WINDOWS_CERTIFICATE_PFX)
          )
          $signTool = Get-ChildItem "${env:ProgramFiles(x86)}\Windows Kits\10\bin" `
            -Filter signtool.exe -File -Recurse |
            Where-Object { $_.FullName -match '\\x64\\signtool\.exe$' } |
            Sort-Object FullName -Descending |
            Select-Object -First 1
          if ($null -eq $signTool) { throw "Windows SDK signtool.exe is unavailable" }
          "WINDOWS_DISTRIBUTION_SIGNED=true" | Out-File $env:GITHUB_ENV -Append -Encoding utf8
          "WINDOWS_SIGNING_PFX=$pfxPath" | Out-File $env:GITHUB_ENV -Append -Encoding utf8
          "WINDOWS_SIGNTOOL=$($signTool.FullName)" | Out-File $env:GITHUB_ENV -Append -Encoding utf8
          Write-Host "Windows Authenticode identity prepared."

      - name: Build and scan Windows onedir
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          python -c "from PIL import Image; Image.open('assets/icon.png').save('icon.ico', sizes=[(16,16),(32,32),(48,48),(256,256)])"
          python scripts/build_release.py --icon icon.ico
          @'
          Speakr includes Qt for Python / PySide6-Essentials 6.11.1.
          Qt for Python is copyright The Qt Company Ltd. and contributors.
          The installed open-source package is offered under LGPL-3.0-only,
          GPL-2.0-only, or GPL-3.0-only, as described by its package metadata.
          Speakr does not modify Qt source files.
          '@ | Set-Content -Encoding utf8 dist\Speakr\THIRD_PARTY_NOTICES.txt
          python scripts\scan_artifact_privacy.py dist\Speakr

      - name: Sign Windows application for distribution
        if: needs.release_context.outputs.publish == 'true'
        env:
          WINDOWS_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
        shell: pwsh
        run: |
          & $env:WINDOWS_SIGNTOOL sign /fd SHA256 /td SHA256 `
            /tr http://timestamp.digicert.com `
            /f $env:WINDOWS_SIGNING_PFX /p $env:WINDOWS_CERTIFICATE_PASSWORD `
            dist\Speakr\Speakr.exe
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          & $env:WINDOWS_SIGNTOOL verify /pa /all /v dist\Speakr\Speakr.exe
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Build Inno Setup installer
        env:
          APP_VERSION: ${{ needs.release_context.outputs.version }}
        shell: pwsh
        run: |
          $iscc = "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe"
          choco install innosetup --version=6.7.1 -y --no-progress --allow-downgrade
          if ($LASTEXITCODE -notin @(0, 1641, 3010)) { exit $LASTEXITCODE }
          if (!(Test-Path -LiteralPath $iscc)) {
            throw "Inno Setup compiler is unavailable"
          }
          $innoPackage = (choco list --exact --limit-output innosetup |
            Where-Object { $_ -like "innosetup|*" } | Select-Object -First 1)
          if ($innoPackage -ne "innosetup|6.7.1") {
            throw "Expected the pinned Inno Setup 6.7.1 package"
          }
          & $iscc "/DAppVersion=$env:APP_VERSION" scripts\installer.iss
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          if (!(Test-Path -LiteralPath Speakr-Setup.exe)) { throw "Installer output is missing" }

      - name: Sign Windows installer for distribution
        if: needs.release_context.outputs.publish == 'true'
        env:
          WINDOWS_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
        shell: pwsh
        run: |
          & $env:WINDOWS_SIGNTOOL sign /fd SHA256 /td SHA256 `
            /tr http://timestamp.digicert.com `
            /f $env:WINDOWS_SIGNING_PFX /p $env:WINDOWS_CERTIFICATE_PASSWORD `
            Speakr-Setup.exe
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          & $env:WINDOWS_SIGNTOOL verify /pa /all /v Speakr-Setup.exe
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Remove Windows signing material
        if: always() && needs.release_context.outputs.publish == 'true'
        shell: pwsh
        run: |
          $fixedPfx = Join-Path $env:RUNNER_TEMP "speakr-code-signing.pfx"
          Remove-Item -LiteralPath $fixedPfx -Force -ErrorAction SilentlyContinue
          if (![string]::IsNullOrWhiteSpace($env:WINDOWS_SIGNING_PFX)) {
            Remove-Item -LiteralPath $env:WINDOWS_SIGNING_PFX -Force -ErrorAction SilentlyContinue
          }

      - name: Silently install, scan, and prove the exact installed app offline
        env:
          HF_HOME: ${{ runner.temp }}/speakr-hf-proof
          RELEASE_SHA: ${{ needs.release_context.outputs.sha }}
          RELEASE_TAG: ${{ needs.release_context.outputs.tag }}
          RELEASE_VERSION: ${{ needs.release_context.outputs.version }}
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $installRoot = Join-Path $env:RUNNER_TEMP "SpeakrInstalled"
          $smokeHome = Join-Path $env:RUNNER_TEMP "SpeakrSmokeHome"
          $receipt = Join-Path $env:RUNNER_TEMP "speakr-final-receipt.json"
          $coreHome = Join-Path $env:RUNNER_TEMP "SpeakrCoreSmokeHome"
          $coreReceipt = Join-Path $env:RUNNER_TEMP "speakr-core-receipt.json"
          $coreUiReceipt = Join-Path $env:RUNNER_TEMP "speakr-core-ui-receipt.json"
          $installerLog = Join-Path $env:RUNNER_TEMP "speakr-installer.log"
          $process = $null
          $uninstaller = $null

          foreach ($path in @($installRoot, $smokeHome, $coreHome)) {
            $resolvedParent = [IO.Path]::GetFullPath((Split-Path -Parent $path))
            if ($resolvedParent -ne [IO.Path]::GetFullPath($env:RUNNER_TEMP)) {
              throw "Refusing to clean an unexpected path: $path"
            }
            Remove-Item -LiteralPath $path -Recurse -Force -ErrorAction SilentlyContinue
          }
          foreach ($path in @($receipt, $coreReceipt, $coreUiReceipt)) {
            Remove-Item -LiteralPath $path -Force -ErrorAction SilentlyContinue
          }
          New-Item -ItemType Directory -Path $smokeHome, $coreHome | Out-Null

          try {
            if ($env:WINDOWS_DISTRIBUTION_SIGNED -eq "true") {
              & $env:WINDOWS_SIGNTOOL verify /pa /all /v Speakr-Setup.exe
              if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
            }
            $install = Start-Process -FilePath (Resolve-Path Speakr-Setup.exe) `
              -ArgumentList @(
                "/VERYSILENT", "/SUPPRESSMSGBOXES", "/NORESTART", "/SP-",
                "/DIR=`"$installRoot`"", "/LOG=`"$installerLog`""
              ) -Wait -PassThru
            if ($install.ExitCode -ne 0) { throw "Silent installer failed with $($install.ExitCode)" }

            $installedExe = Join-Path $installRoot "Speakr.exe"
            if (!(Test-Path -LiteralPath $installedExe)) { throw "Installed executable is missing" }
            $uninstaller = Join-Path $installRoot "unins000.exe"
            if (!(Test-Path -LiteralPath $uninstaller)) { throw "Uninstaller is missing" }
            python scripts\scan_artifact_privacy.py $installRoot
            if ($env:WINDOWS_DISTRIBUTION_SIGNED -eq "true") {
              & $env:WINDOWS_SIGNTOOL verify /pa /all /v $installedExe
              if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
            }

            $env:SPEAKR_HOME = $smokeHome
            $env:SPEAKR_RELEASE_PROOF_PATH = $receipt
            $env:SPEAKR_RELEASE_PROOF_QUIT = "1"
            $env:HF_HUB_OFFLINE = "1"
            $env:TRANSFORMERS_OFFLINE = "1"
            $process = Start-Process -FilePath $installedExe `
              -RedirectStandardOutput smoke_out.log `
              -RedirectStandardError smoke_err.log -PassThru

            $deadline = [DateTime]::UtcNow.AddSeconds(30)
            while (!(Test-Path -LiteralPath $receipt) -and
                   !$process.HasExited -and [DateTime]::UtcNow -lt $deadline) {
              Start-Sleep -Milliseconds 500
              $process.Refresh()
            }
            if (!$process.HasExited) {
              if (!$process.WaitForExit(10000)) { throw "Proof process did not quit after receipt" }
            }
            if ($process.ExitCode -ne 0) {
              Get-Content smoke_out.log, smoke_err.log -ErrorAction SilentlyContinue
              throw "Installed proof process exited with $($process.ExitCode)"
            }
            if (!(Test-Path -LiteralPath $receipt)) {
              Get-Content smoke_out.log, smoke_err.log -ErrorAction SilentlyContinue
              Get-Content (Join-Path $smokeHome "speakr.log") -ErrorAction SilentlyContinue
              throw "Installed app did not emit a native readiness receipt"
            }

            python scripts\validate_release_receipt.py $receipt
            if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

            $coreConfig = @{
              model = "tiny"
              device = "cpu"
              compute_type = "int8"
              keep_mic_stream_open = $false
              log_transcripts = $false
              screen_context = @{ enabled = $false }
              edit_mode = @{ enabled = $false }
              learning = @{ enabled = $false }
              formatting = @{
                enabled = $true
                use_ollama = $false
                autostart_ollama = $false
                include_recent_context = $false
              }
              ui = @{
                onboarding_complete = $true
                open_window_on_start = $true
                hud_visibility = "off"
              }
            }
            $coreConfig | ConvertTo-Json -Depth 8 -Compress |
              Set-Content -LiteralPath (Join-Path $coreHome "config.json") -Encoding utf8

            $env:SPEAKR_HOME = $coreHome
            $env:SPEAKR_RELEASE_PROOF_PATH = $coreUiReceipt
            Remove-Item Env:SPEAKR_RELEASE_PROOF_QUIT -ErrorAction SilentlyContinue
            $env:SPEAKR_RELEASE_CORE_PROOF_PATH = $coreReceipt
            $process = Start-Process -FilePath $installedExe `
              -RedirectStandardOutput core_smoke_out.log `
              -RedirectStandardError core_smoke_err.log -PassThru

            $deadline = [DateTime]::UtcNow.AddSeconds(310)
            while (!(Test-Path -LiteralPath $coreReceipt) -and
                   !$process.HasExited -and [DateTime]::UtcNow -lt $deadline) {
              Start-Sleep -Milliseconds 500
              $process.Refresh()
            }
            if (!$process.HasExited) {
              if (!$process.WaitForExit(10000)) { throw "Core proof process did not quit after readiness" }
            }
            if ($process.ExitCode -ne 0) {
              Get-Content core_smoke_out.log, core_smoke_err.log -ErrorAction SilentlyContinue
              throw "Installed core proof process exited with $($process.ExitCode)"
            }
            if (!(Test-Path -LiteralPath $coreReceipt) -or
                !(Test-Path -LiteralPath $coreUiReceipt)) {
              Get-Content core_smoke_out.log, core_smoke_err.log -ErrorAction SilentlyContinue
              Get-Content (Join-Path $coreHome "speakr.log") -ErrorAction SilentlyContinue
              throw "Installed app did not prove native UI plus offline core readiness"
            }
            python scripts\validate_release_receipt.py $coreUiReceipt
            if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
            python scripts\validate_release_core_receipt.py $coreReceipt
            if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

            if ($env:WINDOWS_DISTRIBUTION_SIGNED -eq "true") {
              $manifestSigned = "true"
              $manifestKind = "authenticode"
              $manifestIdentity = (Get-AuthenticodeSignature $installedExe).SignerCertificate.Subject
              if ([string]::IsNullOrWhiteSpace($manifestIdentity)) {
                throw "Signed installed app did not expose a signer identity"
              }
            }
            else {
              $manifestSigned = "false"
              $manifestKind = "unsigned"
              $manifestIdentity = "unsigned"
            }
            $manifestArgs = @(
              "scripts\release_manifest.py", "create",
              "--output", "Speakr-Windows-manifest.json",
              "--artifact", "Speakr-Setup.exe",
              "--dependency-lock", "requirements-release.txt",
              "--native-receipt", $coreUiReceipt,
              "--core-receipt", $coreReceipt,
              "--source-sha", $env:RELEASE_SHA,
              "--version", $env:RELEASE_VERSION,
              "--platform", "windows",
              "--architecture", "x86_64",
              "--signed", $manifestSigned,
              "--notarized", "false",
              "--signature-kind", $manifestKind,
              "--signer-identity", $manifestIdentity,
              "--signer-team", "none"
            )
            if (![string]::IsNullOrWhiteSpace($env:RELEASE_TAG)) {
              $manifestArgs += @("--tag", $env:RELEASE_TAG)
            }
            python @manifestArgs
            if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          }
          finally {
            if ($null -ne $process -and !$process.HasExited) {
              Stop-Process -Id $process.Id -Force -ErrorAction SilentlyContinue
            }
            if ($null -ne $uninstaller -and (Test-Path -LiteralPath $uninstaller)) {
              $uninstall = Start-Process -FilePath $uninstaller `
                -ArgumentList @("/VERYSILENT", "/SUPPRESSMSGBOXES", "/NORESTART") `
                -Wait -PassThru
              if ($uninstall.ExitCode -ne 0) {
                Write-Error "Silent uninstall failed with $($uninstall.ExitCode)"
              }
            }
          }
          if (Test-Path -LiteralPath (Join-Path $installRoot "Speakr.exe")) {
            throw "Silent uninstall left the installed executable behind"
          }

      - name: Upload Windows proof artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: Speakr-Windows-${{ needs.release_context.outputs.publish == 'true' && 'release' || 'proof-NON-DISTRIBUTABLE' }}
          path: |
            Speakr-Setup.exe
            Speakr-Windows-manifest.json
          if-no-files-found: error
          retention-days: 14

  publish:
    name: Publish exact verified tag artifacts
    needs: [release_context, mac_dmg, windows_installer]
    if: needs.release_context.outputs.publish == 'true'
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ needs.release_context.outputs.sha }}
          fetch-depth: 0

      - name: Re-verify immutable tag before publication
        env:
          RELEASE_TAG: ${{ needs.release_context.outputs.tag }}
          RELEASE_SHA: ${{ needs.release_context.outputs.sha }}
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
        shell: bash
        run: |
          set -euo pipefail
          git show-ref --verify --quiet "refs/tags/$RELEASE_TAG"
          test "$(git rev-list -n 1 "$RELEASE_TAG")" = "$RELEASE_SHA"
          test "$(git rev-parse HEAD)" = "$RELEASE_SHA"
          git fetch --no-tags origin \
            "$DEFAULT_BRANCH:refs/remotes/origin/$DEFAULT_BRANCH"
          git merge-base --is-ancestor "$RELEASE_SHA" "origin/$DEFAULT_BRANCH"

      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          pattern: Speakr-*-release
          path: release-artifacts
          merge-multiple: true

      - name: Verify publication inputs
        env:
          RELEASE_TAG: ${{ needs.release_context.outputs.tag }}
          RELEASE_SHA: ${{ needs.release_context.outputs.sha }}
        shell: bash
        run: |
          set -euo pipefail
          test -f release-artifacts/Speakr.dmg
          test -f release-artifacts/Speakr-Setup.exe
          test -f release-artifacts/Speakr-macOS-manifest.json
          test -f release-artifacts/Speakr-Windows-manifest.json
          python scripts/release_manifest.py verify \
            --manifest release-artifacts/Speakr-macOS-manifest.json \
            --artifact release-artifacts/Speakr.dmg \
            --dependency-lock requirements-release.txt \
            --source-sha "$RELEASE_SHA" \
            --tag "$RELEASE_TAG"
          python scripts/release_manifest.py verify \
            --manifest release-artifacts/Speakr-Windows-manifest.json \
            --artifact release-artifacts/Speakr-Setup.exe \
            --dependency-lock requirements-release.txt \
            --source-sha "$RELEASE_SHA" \
            --tag "$RELEASE_TAG"
          find release-artifacts -maxdepth 1 -type f -print

      - name: Upload assets to the verified GitHub release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        with:
          tag_name: ${{ needs.release_context.outputs.tag }}
          files: |
            release-artifacts/Speakr.dmg
            release-artifacts/Speakr-Setup.exe
            release-artifacts/Speakr-macOS-manifest.json
            release-artifacts/Speakr-Windows-manifest.json
